<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lovelux — AI 情绪舒缓助手</title>
<style>
  :root {
    --bg: #f3f4f6;
    --surface: #ffffff;
    --primary: #6366f1;
    --primary-light: #e0e7ff;
    --user-bubble: #6366f1;
    --ai-bubble: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 18px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100dvh;
    display: flex; justify-content: center; align-items: center;
  }

  /* ---- App Shell ---- */
  .app {
    width: 100%; max-width: 520px; height: 100dvh;
    display: flex; flex-direction: column;
    background: var(--bg); position: relative; overflow: hidden;
  }

  /* ---- Header ---- */
  .header {
    background: var(--surface); padding: 16px 20px;
    text-align: center; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .status { font-size: 12px; color: var(--success); margin-top: 2px; }

  /* ---- Messages ---- */
  .msg-list {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg-row { display: flex; gap: 10px; align-items: flex-end; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-row .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    flex-shrink: 0; object-fit: cover;
  }
  .msg-row .body { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
  .msg-row.user .body { align-items: flex-end; }

  .bubble {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: 15px; line-height: 1.55; word-break: break-word;
    box-shadow: var(--shadow);
  }
  .msg-row.ai .bubble { background: var(--ai-bubble); border-top-left-radius: 4px; }
  .msg-row.user .bubble { background: var(--user-bubble); color: #fff; border-top-right-radius: 4px; }

  /* emotion tag inside user bubble */
  .emotion-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; padding: 4px 10px; border-radius: 20px;
    margin-bottom: 6px;
    background: rgba(255,255,255,.2); color: #fff;
  }
  .source-chip {
    display: inline-block; font-size: 11px; color: var(--text-muted);
    background: #f1f5f9; padding: 4px 10px; border-radius: 10px;
    margin-top: 6px; cursor: pointer;
  }

  /* ---- Emotion Preview Bar ---- */
  .emotion-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: #fffbeb; border-top: 1px solid #fde68a;
    flex-shrink: 0; animation: slideUp .25s ease;
  }
  .emotion-bar .left { display: flex; align-items: center; gap: 10px; }
  .emotion-bar .icon { font-size: 28px; }
  .emotion-bar .label { font-size: 14px; color: #92400e; font-weight: 500; }
  .emotion-bar .clear-btn {
    background: none; border: none; font-size: 18px;
    color: #a1a1aa; cursor: pointer; padding: 4px 8px;
  }

  /* ---- Camera modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; animation: fadeIn .2s ease;
  }
  .modal-sheet {
    background: var(--surface); width: 100%; max-width: 520px;
    border-radius: 20px 20px 0 0; padding: 20px;
    animation: slideUp .3s ease;
  }
  .modal-sheet h3 { font-size: 16px; text-align: center; margin-bottom: 16px; }
  .camera-view {
    width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px;
    overflow: hidden; position: relative; margin-bottom: 16px;
  }
  .camera-view video { width: 100%; height: 100%; object-fit: cover; }
  .camera-view canvas { display: none; }
  .modal-actions { display: flex; gap: 12px; }
  .modal-actions button {
    flex: 1; padding: 14px; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-outline { background: var(--surface); color: var(--text); border: 1.5px solid var(--border)!important; }
  .btn-danger { background: var(--danger); color: #fff; }

  /* ---- Input area ---- */
  .input-area {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .icon-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--primary-light); border: none;
    font-size: 22px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s;
  }
  .icon-btn:active { transform: scale(.9); }
  .chat-input {
    flex: 1; height: 42px; padding: 0 16px;
    border: 1.5px solid var(--border); border-radius: 21px;
    font-size: 15px; outline: none; background: #f8fafc;
  }
  .chat-input:focus { border-color: var(--primary); }
  .send-btn {
    height: 42px; padding: 0 20px; border-radius: 21px;
    background: var(--primary); color: #fff; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    flex-shrink: 0; transition: opacity .15s;
  }
  .send-btn:disabled { opacity: .4; pointer-events: none; }

  /* ---- Loader ---- */
  .typing-indicator {
    display: flex; gap: 4px; padding: 12px 16px;
  }
  .typing-indicator span {
    width: 7px; height: 7px; background: #94a3b8; border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .15s; }
  .typing-indicator span:nth-child(3) { animation-delay: .3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  /* Scrollbar */
  .msg-list::-webkit-scrollbar { width: 4px; }
  .msg-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

  @media (max-width: 520px) {
    .bubble { font-size: 14px; }
    .msg-row .body { max-width: 82%; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header" style="display:flex;align-items:center;gap:12px;padding:12px 16px;text-align:left;">
    <a href="/home" style="width:34px;height:34px;border-radius:50%;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;text-decoration:none;color:#1e293b;font-size:18px;flex-shrink:0;">←</a>
    <div>
      <h1 style="font-size:16px;">🧬 AI 情绪舒缓助手</h1>
      <div class="status">● 在线 · RAG 心理知识库</div>
    </div>
  </div>

  <!-- Messages -->
  <div class="msg-list" id="msgList">
    <div class="msg-row ai">
      <img class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e0e7ff' width='100' height='100'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='40'%3E🧠%3C/text%3E%3C/svg%3E" alt="AI">
      <div class="body">
        <div class="bubble">你好呀！我是你的 AI 心理助手 🌸<br><br>你可以直接跟我聊天，也可以点击左下角的 📷 按钮拍张照，我通过你的表情更好地理解你的情绪。<br><br>今天感觉怎么样？</div>
      </div>
    </div>
  </div>

  <!-- Emotion preview bar (hidden by default) -->
  <div class="emotion-bar" id="emotionBar" style="display:none;">
    <div class="left">
      <span class="icon" id="emotionIcon"></span>
      <span class="label" id="emotionLabel"></span>
    </div>
    <button class="clear-btn" onclick="clearEmotion()">✕</button>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <button class="icon-btn" onclick="document.getElementById('cameraInput').click()" title="拍照分析表情">📷</button>
    <button class="icon-btn" onclick="document.getElementById('galleryInput').click()" title="从相册选择">🖼️</button>
    <input class="chat-input" id="chatInput" type="text" placeholder="跟我聊聊你的烦恼或压力..."
           onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" accept="image/*" capture="user" id="cameraInput" style="display:none"
       onchange="handleImagePick(event)">
<input type="file" accept="image/*" id="galleryInput" style="display:none"
       onchange="handleImagePick(event)">

<script>
// ===================== State =====================
const API = 'http://127.0.0.1:8080';
let emotionContext = null;
let emotionPreview = null;
let isLoading = false;

// ===================== Chat =====================
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  const hasEmotion = emotionContext !== null;
  if (!text && !hasEmotion) return;
  if (isLoading) return;

  const userMsg = text || '我现在的情绪状态是这样，你能给我一些建议吗？';
  input.value = '';
  const currentEmotion = emotionContext;
  const currentPreview = emotionPreview;

  // Render user message
  addMessage('user', userMsg, currentPreview);
  clearEmotion();
  scrollBottom();

  // Show typing
  isLoading = true;
  updateSendBtn();
  const typingEl = addTyping();
  scrollBottom();

  // Build request
  const body = { message: userMsg };
  if (currentEmotion) body.emotion_context = currentEmotion;

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    // Remove typing
    typingEl.remove();

    if (data.status === 200) {
      addMessage('ai', data.data.reply, null, data.data.source);
    } else {
      addMessage('ai', '抱歉，我暂时无法回复，请稍后再试 🙏');
    }
  } catch (err) {
    typingEl.remove();
    console.error(err);
    addMessage('ai', '💔 无法连接后端服务，请确认 FastAPI 已在 8080 端口启动。');
  } finally {
    isLoading = false;
    updateSendBtn();
    scrollBottom();
  }
}

function addMessage(role, content, emotion, source) {
  const list = document.getElementById('msgList');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatars = {
    user: `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23c7d2fe' width='100' height='100'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='40'%3E👤%3C/text%3E%3C/svg%3E`,
    ai: `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e0e7ff' width='100' height='100'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='40'%3E🧠%3C/text%3E%3C/svg%3E`
  };

  let bodyHTML = '';
  if (role === 'user' && emotion) {
    bodyHTML += `<span class="emotion-chip">${emotion.icon} ${emotion.label}</span>`;
  }
  bodyHTML += `<div class="bubble">${escapeHTML(content)}</div>`;
  if (role === 'ai' && source && source !== '无相关参考资料') {
    bodyHTML += `<span class="source-chip" onclick="alert('${escapeAttr(source)}')">🔍 知识来源</span>`;
  }

  row.innerHTML = `<img class="avatar" src="${avatars[role]}" alt="${role}"><div class="body">${bodyHTML}</div>`;
  list.appendChild(row);
}

function addTyping() {
  const list = document.getElementById('msgList');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <img class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e0e7ff' width='100' height='100'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='40'%3E🧠%3C/text%3E%3C/svg%3E" alt="AI">
    <div class="body"><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
  list.appendChild(row);
  return row;
}

function updateSendBtn() {
  document.getElementById('sendBtn').textContent = isLoading ? '...' : '发送';
}

function scrollBottom() {
  const list = document.getElementById('msgList');
  requestAnimationFrame(() => { list.scrollTop = list.scrollHeight; });
}

// ===================== Emotion =====================
async function analyzeImage(base64Data) {
  updateSendBtnForAnalyze(true);
  try {
    const res = await fetch(`${API}/analyze_emotion`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64Data })
    });
    const data = await res.json();

    if (data.status === 200 && data.data.emotion_summary) {
      const s = data.data.emotion_summary;
      emotionContext = s;
      emotionPreview = {
        icon: getEmotionIcon(s.primary_emotion),
        label: s.primary_emotion_zh || s.primary_emotion
      };
      showEmotionBar();
      showToast('✅ 表情分析完成');
    } else {
      showToast('未检测到清晰人脸，请重试');
    }
  } catch (err) {
    console.error(err);
    showToast('分析失败，请确认后端服务已启动');
  } finally {
    updateSendBtnForAnalyze(false);
  }
}

function updateSendBtnForAnalyze(analyzing) {
  const btn = document.getElementById('sendBtn');
  btn.textContent = analyzing ? '分析中' : '发送';
  btn.disabled = analyzing;
  document.getElementById('chatInput').disabled = analyzing;
}

function getEmotionIcon(emotion) {
  const map = {
    happy:'😊', sad:'😢', angry:'😠', fear:'😨',
    surprise:'😲', disgust:'🤢', neutral:'😐'
  };
  return map[emotion] || '😐';
}

function showEmotionBar() {
  if (!emotionPreview) return;
  const bar = document.getElementById('emotionBar');
  document.getElementById('emotionIcon').textContent = emotionPreview.icon;
  document.getElementById('emotionLabel').textContent = '检测到情绪: ' + emotionPreview.label;
  bar.style.display = 'flex';
}

function clearEmotion() {
  emotionContext = null;
  emotionPreview = null;
  document.getElementById('emotionBar').style.display = 'none';
}

// ===================== Image Pick & Emotion =====================
function handleImagePick(event) {
  const file = event.target.files[0];
  if (!file) return;
  showToast('正在分析表情...');
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result;
    analyzeImage(base64);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ===================== Helpers =====================
function showToast(msg) {
  // simple toast: create, animate, remove
  const el = document.createElement('div');
  el.textContent = msg;
  Object.assign(el.style, {
    position:'fixed', bottom:'100px', left:'50%', transform:'translateX(-50%)',
    background:'#1e293b', color:'#fff', padding:'10px 24px',
    borderRadius:'24px', fontSize:'14px', zIndex:'200',
    animation:'slideUp .3s ease', pointerEvents:'none'
  });
  document.body.appendChild(el);
  setTimeout(() => { el.remove(); }, 2000);
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
}

// Init
updateSendBtn();
</script>
</body>
</html>
