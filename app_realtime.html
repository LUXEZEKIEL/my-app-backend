<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lovelux — 实时情绪识别</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --primary: #818cf8;
    --primary-glow: rgba(129,140,248,.3);
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100dvh;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }

  .app { width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; position: relative; }

  /* ---- Header ---- */
  .header {
    padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 6px; }
  .header-status { font-size: 11px; color: var(--text-muted); }

  /* ---- Camera View ---- */
  .camera-container {
    position: relative; flex-shrink: 0;
    width: 100%; aspect-ratio: 4/3; background: #000;
    overflow: hidden;
  }
  .camera-container video {
    width: 100%; height: 100%; object-fit: cover;
  }
  .camera-container canvas { display: none; }

  /* Emotion Overlay on video */
  .emotion-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,.7));
    display: flex; align-items: flex-end; gap: 12px;
  }
  .emotion-main {
    background: rgba(15,23,42,.85); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .emotion-main .emoji { font-size: 32px; }
  .emotion-main .info {}
  .emotion-main .label { font-size: 16px; font-weight: 700; }
  .emotion-main .confidence { font-size: 11px; color: var(--text-muted); }
  .emotion-scores {
    display: flex; gap: 6px; flex-wrap: wrap;
    background: rgba(15,23,42,.85); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: var(--radius); padding: 10px 14px;
  }
  .score-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .score-item .bar {
    width: 6px; border-radius: 3px; background: var(--surface2);
    transition: height .3s;
  }
  .score-item .bar.active { background: var(--primary); }
  .score-item .s-label { font-size: 9px; color: var(--text-muted); }
  .score-item .s-pct { font-size: 10px; font-weight: 600; }

  /* Camera controls */
  .cam-controls {
    position: absolute; top: 12px; right: 12px;
    display: flex; gap: 8px;
  }
  .cam-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(15,23,42,.6); border: 1px solid rgba(255,255,255,.2);
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .cam-btn.active { background: var(--primary); border-color: var(--primary); }

  /* No camera state */
  .no-camera {
    position: absolute; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    background: var(--surface); color: var(--text-muted); gap: 12px;
  }
  .no-camera .big-icon { font-size: 48px; }
  .start-cam-btn {
    padding: 12px 28px; border-radius: 24px; border: none;
    background: var(--primary); color: #fff; font-size: 15px;
    font-weight: 600; cursor: pointer;
  }

  /* ---- Chat mini ---- */
  .chat-section {
    flex: 1; display: flex; flex-direction: column; min-height: 0;
  }
  .chat-header-mini {
    font-size: 12px; color: var(--text-muted); padding: 8px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; display: flex; justify-content: space-between;
  }
  .msg-list {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-row .avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; font-size: 16px; text-align: center; line-height: 28px; }
  .msg-row .body { max-width: 80%; }
  .bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg-row.ai .bubble { background: var(--surface); border-top-left-radius: 2px; }
  .msg-row.user .bubble { background: var(--primary); color: #fff; border-top-right-radius: 2px; }

  .chat-input-row {
    display: flex; gap: 8px; padding: 10px 16px;
    background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .chat-input-row input {
    flex:1; height:38px; padding:0 14px; border-radius:19px;
    border:1px solid var(--border); background:var(--bg); color:var(--text);
    font-size:13px; outline:none;
  }
  .chat-input-row input:focus { border-color: var(--primary); }
  .chat-input-row button {
    height:38px; padding:0 16px; border-radius:19px; border:none;
    background:var(--primary); color:#fff; font-size:13px; font-weight:600; cursor:pointer;
    flex-shrink:0;
  }
  .chat-input-row button:disabled { opacity:.4; }

  .emotion-chip-mini {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    margin-bottom: 4px; background: rgba(255,255,255,.15); color: #fff;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: var(--surface); color: var(--text); padding: 10px 24px;
    border-radius: 24px; font-size: 13px; z-index: 200;
    border: 1px solid var(--border); animation: slideUp .25s ease; pointer-events: none;
  }
  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(20px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  .msg-list::-webkit-scrollbar { width: 3px; }
  .msg-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 480px) {
    .emotion-main .emoji { font-size: 24px; }
    .emotion-main .label { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>🧬 实时情绪识别</h1>
      <span class="header-status"><span class="status-dot"></span>RetinaFace + Emotion AI</span>
    </div>
  </div>

  <!-- Camera -->
  <div class="camera-container" id="camContainer">
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="camCanvas"></canvas>

    <!-- No camera fallback -->
    <div class="no-camera" id="noCamera">
      <div class="big-icon">📷</div>
      <p>开启摄像头进行实时情绪识别</p>
      <button class="start-cam-btn" onclick="startCamera()">开启摄像头</button>
    </div>

    <!-- Emotion overlay -->
    <div class="emotion-overlay" id="emotionOverlay" style="display:none;">
      <div class="emotion-main">
        <span class="emoji" id="emotionEmoji">😐</span>
        <div class="info">
          <div class="label" id="emotionLabel">--</div>
          <div class="confidence" id="emotionConf">等待检测...</div>
        </div>
      </div>
      <div class="emotion-scores" id="emotionScores"></div>
    </div>

    <!-- Camera controls -->
    <div class="cam-controls" id="camControls" style="display:none;">
      <button class="cam-btn" id="btnPause" onclick="togglePause()" title="暂停/继续">⏯️</button>
      <button class="cam-btn" onclick="switchCamera()" title="翻转镜头">🔄</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-section">
    <div class="chat-header-mini">
      <span>💬 情绪感知对话</span>
      <span id="currentEmotionTag" style="color:var(--primary);"></span>
    </div>
    <div class="msg-list" id="msgList">
      <div class="msg-row ai">
        <div class="avatar">🧠</div>
        <div class="body"><div class="bubble">你好！摄像头开启后我会实时分析你的表情情绪，你也可以随时跟我聊天 🌸</div></div>
      </div>
    </div>
    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="说说你的感受..."
             onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<script>
// ===================== State =====================
const API = '';
let cameraStream = null;
let facingMode = 'user';
let isPaused = false;
let analysisTimer = null;
let lastEmotion = null;      // latest emotion result
let lastAnalysisTime = 0;
const ANALYSIS_INTERVAL = 1500;  // analyze every 1.5s
let isLoading = false;

// ===================== Camera =====================
async function startCamera() {
  if (!navigator.mediaDevices?.getUserMedia) {
    showToast('浏览器不支持摄像头，请使用 Chrome 或 Edge');
    return;
  }
  stopCamera();
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    const video = document.getElementById('camVideo');
    video.srcObject = cameraStream;
    await video.play();

    document.getElementById('noCamera').style.display = 'none';
    document.getElementById('emotionOverlay').style.display = 'flex';
    document.getElementById('camControls').style.display = 'flex';
    showToast('摄像头已启动，实时分析中...');
    startAnalysisLoop();
  } catch (err) {
    console.error('Camera error:', err.name, err.message);
    if (err.name === 'NotAllowedError') {
      showToast('摄像头权限被拒绝，请在浏览器设置中允许');
    } else if (err.name === 'NotFoundError') {
      showToast('未检测到摄像头设备');
    } else {
      showToast('摄像头启动失败: ' + err.message);
    }
  }
}

function stopCamera() {
  if (analysisTimer) { clearTimeout(analysisTimer); analysisTimer = null; }
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
}

function switchCamera() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  stopCamera();
  startCamera();
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('btnPause').classList.toggle('active', isPaused);
  if (isPaused) {
    if (analysisTimer) { clearTimeout(analysisTimer); analysisTimer = null; }
    showToast('已暂停实时分析');
  } else {
    showToast('已恢复实时分析');
    startAnalysisLoop();
  }
}

// ===================== Real-time Analysis Loop =====================
function startAnalysisLoop() {
  if (isPaused || !cameraStream) return;
  analysisTimer = setTimeout(() => {
    captureAndAnalyze();
    startAnalysisLoop();
  }, ANALYSIS_INTERVAL);
}

function captureAndAnalyze() {
  const video = document.getElementById('camVideo');
  if (!video.videoWidth || video.readyState < 2) return;

  const canvas = document.getElementById('camCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  const base64 = canvas.toDataURL('image/jpeg', 0.7);
  analyzeEmotion(base64);
}

async function analyzeEmotion(base64Data) {
  const now = Date.now();
  if (now - lastAnalysisTime < 800) return; // throttle
  lastAnalysisTime = now;

  try {
    const res = await fetch(`${API}/analyze_emotion`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64Data })
    });
    const data = await res.json();

    if (data.status === 200 && data.data.emotion_summary) {
      const s = data.data.emotion_summary;
      const faces = data.data.faces || [];
      const topFace = faces[0] || {};

      lastEmotion = {
        primary_emotion: s.primary_emotion,
        primary_emotion_zh: s.primary_emotion_zh,
        advice_hint: s.advice_hint,
        scores: topFace.emotion_scores || {}
      };

      updateEmotionOverlay(lastEmotion);
      updateCurrentEmotionTag(lastEmotion);
    }
  } catch (err) {
    // Silently ignore network errors during real-time analysis
    console.error('Analysis error:', err.message);
  }
}

function updateEmotionOverlay(emotion) {
  const iconMap = {
    happy:'😊', sad:'😢', angry:'😠', fear:'😨',
    surprise:'😲', disgust:'🤢', neutral:'😐'
  };
  document.getElementById('emotionEmoji').textContent = iconMap[emotion.primary_emotion] || '😐';
  document.getElementById('emotionLabel').textContent = emotion.primary_emotion_zh || emotion.primary_emotion;

  // confidence from top score
  const scores = emotion.scores;
  if (scores && Object.keys(scores).length > 0) {
    const topScore = Object.values(scores)[0];
    document.getElementById('emotionConf').textContent = `置信度 ${topScore.toFixed(0)}%`;
  }

  // Mini score bars
  const scoresContainer = document.getElementById('emotionScores');
  if (scores) {
    const iconShort = { happy:'😊', sad:'😢', angry:'😠', fear:'😨', surprise:'😲', disgust:'🤢', neutral:'😐' };
    scoresContainer.innerHTML = Object.entries(scores).slice(0, 4).map(([k, v]) => {
      const pct = Math.round(v);
      const h = Math.max(4, pct);
      return `<div class="score-item">
        <span style="font-size:12px;">${iconShort[k]||k}</span>
        <div class="bar${k===emotion.primary_emotion?' active':''}" style="height:${h}px;"></div>
        <span class="s-pct">${pct}%</span>
      </div>`;
    }).join('');
  }
}

function updateCurrentEmotionTag(emotion) {
  const tag = document.getElementById('currentEmotionTag');
  if (tag) {
    tag.textContent = `当前情绪: ${emotion.primary_emotion_zh || emotion.primary_emotion}`;
  }
}

// ===================== Chat =====================
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  if (isLoading) return;
  input.value = '';

  const currentEmotion = lastEmotion;

  // Render user message
  addMessage('user', text, currentEmotion);
  scrollBottom();

  // Show typing
  isLoading = true;
  updateSendBtn();
  const typingEl = addTyping();
  scrollBottom();

  const body = { message: text };
  if (currentEmotion) {
    body.emotion_context = {
      primary_emotion: currentEmotion.primary_emotion,
      primary_emotion_zh: currentEmotion.primary_emotion_zh,
      advice_hint: currentEmotion.advice_hint
    };
  }

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    typingEl.remove();

    if (data.status === 200) {
      addMessage('ai', data.data.reply);
    } else {
      addMessage('ai', '抱歉，我暂时无法回复 🙏');
    }
  } catch (err) {
    typingEl.remove();
    console.error(err);
    addMessage('ai', '💔 无法连接后端服务');
  } finally {
    isLoading = false;
    updateSendBtn();
    scrollBottom();
  }
}

function addMessage(role, content, emotion) {
  const list = document.getElementById('msgList');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  let bodyHTML = '';
  if (role === 'user' && emotion) {
    const iconMap = { happy:'😊', sad:'😢', angry:'😠', fear:'😨', surprise:'😲', disgust:'🤢', neutral:'😐' };
    const icon = iconMap[emotion.primary_emotion] || '😐';
    bodyHTML += `<span class="emotion-chip-mini">${icon} ${emotion.primary_emotion_zh||emotion.primary_emotion}</span>`;
  }
  bodyHTML += `<div class="bubble">${escapeHTML(content)}</div>`;

  const avatar = role === 'ai' ? '🧠' : '👤';
  row.innerHTML = `<div class="avatar">${avatar}</div><div class="body">${bodyHTML}</div>`;
  list.appendChild(row);
}

function addTyping() {
  const list = document.getElementById('msgList');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = '<div class="avatar">🧠</div><div class="body"><div class="bubble" style="color:var(--text-muted);">输入中...</div></div>';
  list.appendChild(row);
  return row;
}

function updateSendBtn() {
  document.getElementById('sendBtn').textContent = isLoading ? '...' : '发送';
}

function scrollBottom() {
  const list = document.getElementById('msgList');
  requestAnimationFrame(() => { list.scrollTop = list.scrollHeight; });
}

// ===================== Helpers =====================
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===================== Init =====================
updateSendBtn();
// Auto-start camera on load
startCamera();
</script>
</body>
</html>
