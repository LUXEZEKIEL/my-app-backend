<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lovelux — CBT-I 失眠指导</title>
<style>
  :root {
    --bg: #f8f6f4; --surface: #ffffff; --text: #2d2a26;
    --text-muted: #78716c; --border: #e7e5e4;
    --primary: #6366f1; --primary-light: #eef2ff;
    --accent: #0d9488;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100dvh;
    display: flex; justify-content: center;
  }
  .app { width:100%; max-width:520px; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  .header {
    padding:14px 20px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
  }
  .header h1 { font-size:17px; }
  .header .badge { font-size:11px; padding:4px 10px; border-radius:12px; background:#ccfbf1; color:#0f766e; font-weight:600; }

  /* Sleep diary panel */
  .diary-toggle {
    padding:8px 16px; font-size:12px; color:var(--primary); cursor:pointer;
    background:var(--primary-light); border:none; display:block; width:100%; text-align:center;
  }
  .diary-panel {
    background:var(--surface); padding:12px 16px; border-bottom:1px solid var(--border);
    display:grid; grid-template-columns:1fr 1fr; gap:8px; flex-shrink:0;
  }
  .diary-field { display:flex; flex-direction:column; gap:2px; }
  .diary-field label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; }
  .diary-field input {
    height:32px; padding:0 8px; border:1px solid var(--border); border-radius:8px;
    font-size:13px; background:#fafaf9;
  }

  /* Chat */
  .msg-list {
    flex:1; overflow-y:auto; padding:12px 16px;
    display:flex; flex-direction:column; gap:10px;
  }
  .msg { padding:12px 16px; border-radius:14px; font-size:14px; line-height:1.65; max-width:88%; }
  .msg.ai { background:var(--surface); align-self:flex-start; border:1px solid var(--border); white-space:pre-wrap; }
  .msg.user { background:var(--primary); color:#fff; align-self:flex-end; }
  .msg .label { font-size:10px; opacity:.6; margin-bottom:4px; display:block; }

  .input-row {
    display:flex; gap:8px; padding:12px 16px; background:var(--surface);
    border-top:1px solid var(--border); flex-shrink:0;
  }
  .input-row input {
    flex:1; height:40px; padding:0 14px; border-radius:20px;
    border:1px solid var(--border); font-size:14px; outline:none;
  }
  .input-row button {
    height:40px; padding:0 20px; border-radius:20px; border:none;
    background:var(--accent); color:#fff; font-size:14px; font-weight:600; cursor:pointer;
  }
  .input-row button:disabled { opacity:.4; }

  .quick-actions { display:flex; gap:6px; padding:4px 16px 8px; flex-wrap:wrap; flex-shrink:0; }
  .quick-btn {
    padding:6px 14px; border-radius:16px; border:1px solid var(--border);
    background:var(--surface); font-size:11px; cursor:pointer; white-space:nowrap;
  }
  .msg-list::-webkit-scrollbar { width:3px; }
  .msg-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="/home" style="width:34px;height:34px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--text);font-size:18px;flex-shrink:0;margin-right:12px;">←</a>
    <h1>🛏️ CBT-I 失眠指导</h1>
    <span class="badge">临床协议驱动</span>
  </div>

  <button class="diary-toggle" onclick="toggleDiary()">📋 睡眠日记（点击展开/收起）</button>
  <div class="diary-panel" id="diaryPanel" style="display:none;">
    <div class="diary-field"><label>上床时间</label><input id="bedTime" placeholder="如 23:00"></div>
    <div class="diary-field"><label>入睡用时(分钟)</label><input id="sleepLatency" type="number" placeholder="如 30"></div>
    <div class="diary-field"><label>夜间醒来次数</label><input id="nightWakes" type="number" placeholder="如 2"></div>
    <div class="diary-field"><label>起床时间</label><input id="wakeTime" placeholder="如 7:00"></div>
    <div class="diary-field"><label>实际睡了(小时)</label><input id="totalSleep" type="number" step="0.5" placeholder="如 5.5"></div>
    <div class="diary-field"><label>卧床总时长(小时)</label><input id="timeInBed" type="number" step="0.5" placeholder="如 8"></div>
    <div class="diary-field"><label>日间疲劳(1-10)</label><input id="fatigue" type="number" min="1" max="10" placeholder="如 6"></div>
    <div class="diary-field" style="grid-column:1/-1;text-align:center;">
      <span style="font-size:11px;color:var(--text-muted);" id="efficiencyHint"></span>
    </div>
  </div>

  <div class="msg-list" id="msgList">
    <div class="msg ai">
      <span class="label">🧠 CBT-I 临床心理师</span>
      你好！我是专门从事CBT-I失眠认知行为治疗的教练。🌙<br><br>
      CBT-I是国际上治疗慢性失眠最有效的方法，治愈率60-80%，比安眠药更持久。<br><br>
      <b>开始之前，告诉我你的睡眠困扰吧：</b><br>
      • 入睡困难还是容易早醒？<br>
      • 大概持续多久了？<br>
      • 每晚大概能睡几个小时？<br>
      • 白天感觉多疲劳（1-10分）？
    </div>
  </div>

  <div class="quick-actions">
    <button class="quick-btn" onclick="quickSend('我入睡困难，躺下后脑子停不下来')">💭 入睡困难</button>
    <button class="quick-btn" onclick="quickSend('我半夜总是醒，醒了就睡不着了')">⏰ 半夜早醒</button>
    <button class="quick-btn" onclick="quickSend('帮我计算一下我的睡眠效率')">📊 算睡眠效率</button>
    <button class="quick-btn" onclick="quickSend('教我4-7-8呼吸法')">🫁 放松训练</button>
    <button class="quick-btn" onclick="quickSend('怎么改变我对失眠的恐惧？')">🧠 认知重构</button>
  </div>

  <div class="input-row">
    <input id="chatInput" type="text" placeholder="说说你的睡眠困扰..."
           onkeydown="if(event.key==='Enter')sendWithDiary()">
    <button id="sendBtn" onclick="sendWithDiary()">发送</button>
  </div>
</div>

<script>
const API = '';

function toggleDiary() {
  const p = document.getElementById('diaryPanel');
  p.style.display = p.style.display === 'none' ? 'grid' : 'none';
}
// Auto-calculate sleep efficiency
['totalSleep','timeInBed'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', calcEfficiency);
});
function calcEfficiency() {
  const ast = parseFloat(document.getElementById('totalSleep').value);
  const tib = parseFloat(document.getElementById('timeInBed').value);
  const hint = document.getElementById('efficiencyHint');
  if (ast && tib && tib > 0) {
    const se = Math.round(ast / tib * 100);
    const emoji = se >= 85 ? '🟢' : se >= 75 ? '🟡' : '🔴';
    hint.textContent = `${emoji} 睡眠效率: ${se}%（目标>85%）`;
  }
}

function getDiaryData() {
  const bed = document.getElementById('bedTime').value;
  if (!bed && !document.getElementById('totalSleep').value) return null;
  return {
    bed_time: bed || undefined,
    sleep_latency: document.getElementById('sleepLatency').value || undefined,
    night_wakes: document.getElementById('nightWakes').value || undefined,
    wake_time: document.getElementById('wakeTime').value || undefined,
    total_sleep: document.getElementById('totalSleep').value || undefined,
    time_in_bed: document.getElementById('timeInBed').value || undefined,
    fatigue: document.getElementById('fatigue').value || undefined,
    sleep_efficiency: (() => {
      const a=parseFloat(document.getElementById('totalSleep').value);
      const t=parseFloat(document.getElementById('timeInBed').value);
      return a&&t?Math.round(a/t*100):undefined;
    })()
  };
}

function quickSend(text) { document.getElementById('chatInput').value = text; sendWithDiary(); }

async function sendWithDiary() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const diary = getDiaryData();
  const list = document.getElementById('msgList');

  // Show what was sent
  let displayText = text;
  if (diary?.total_sleep) {
    displayText = `📋 [附带睡眠日记: 睡${diary.total_sleep}h, 床${diary.time_in_bed}h, SE${diary.sleep_efficiency||'?'}%]\n${text}`;
  }
  list.innerHTML += `<div class="msg user">${escapeHTML(displayText)}</div>`;
  list.innerHTML += `<div class="msg ai"><span style="opacity:.5">思考中...</span></div>`;
  const loadingEl = list.lastElementChild;
  list.scrollTop = list.scrollHeight;

  const body = { message: text };
  if (diary) body.sleep_diary = diary;

  try {
    const res = await fetch(`${API}/chat_cbti`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    const data = await res.json();
    loadingEl.remove();
    if (data.status===200) {
      list.innerHTML += `<div class="msg ai"><span class="label">🧠 CBT-I 临床心理师</span>${escapeHTML(data.data.reply)}</div>`;
    }
  } catch(e) {
    loadingEl.remove();
    list.innerHTML += `<div class="msg ai">💔 连接后端失败</div>`;
  }
  list.scrollTop = list.scrollHeight;
}

function escapeHTML(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}
</script>
</body>
</html>
